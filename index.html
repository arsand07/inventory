<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventory Ruko</title>
    <style>
        /* Reset margin dan padding default browser */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* Mengunci ukuran html dan body agar pas dengan layar gadget/PC tanpa scrollbar ganda */
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8fafc;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Container pembungkus utama */
        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* Elemen iframe dikonfigurasi penuh mengikuti ukuran pembungkus */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbwtB6e9Uap3ZefUjHgwSFh3mq8xYlPyYBnoTx46_W4w1aOvyWxpgCC_VPXG_nLCC44g/exec" 
            allow="clipboard-read; clipboard-write"
            loading="lazy">
        </iframe>
    </div>

</body>
</html>
